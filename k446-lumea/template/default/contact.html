{include file=head.html}
{pboot:sort scode={sort:tcode}}
<div class="v2-page-banner" style="margin-top:72px">
  <div class="v2-bg-image" style="background-image:url([sort:pic])"></div>
  <div class="v2-wrap">
    <h1 class="v2-fade-up">[sort:name]</h1>
  </div>
{/pboot:sort}
</div>

<div class="v2-contact">
  <div class="v2-wrap">
    <div class="v2-contact-grid">
      <div class="v2-contact-info">
        <div class="v2-contact-item v2-fade-up">
          <h4>Contact</h4>
          <p>{pboot:companyaddress}</p>
          <p>Phone: <a href="tel:{pboot:companyphone}">{pboot:companyphone}</a></p>
          <p>Email: <a href="mailto:{pboot:companyemail}">{pboot:companyemail}</a></p>
        </div>
        <div class="v2-contact-item v2-fade-up">
          <h4>Hours</h4>
          <p>{label:working_hours}</p>
        </div>
      </div>
      <div class="v2-map v2-fade-up">
        <iframe src="{label:google_map_embed}" width="100%" height="100%" allowfullscreen="" loading="lazy"></iframe>
      </div>
    </div>

    <div class="v2-section v2-fade-up" id="contact-form">
      <h2 class="v2-h2" style="margin:40px 0 20px">Send us an <i>inquiry</i></h2>
      <form class="v2-form" method="post" action="{pboot:message}">
        <div class="v2-form-row">
          <div>
            <label><span class="v2-required">Name</span></label>
            <input type="text" name="name" required>
          </div>
          <div>
            <label><span class="v2-required">Email</span></label>
            <input type="email" name="email" required>
          </div>
        </div>
        <div class="v2-form-row">
          <div>
            <label>Company</label>
            <input type="text" name="company">
          </div>
          <div>
            <label>Project type</label>
            <select name="ext_projecttype">
              <option value="">Select type</option>
              <option>Hotel / Hospitality</option>
              <option>Residence / Villa</option>
              <option>Retail / Commercial</option>
              <option>Other</option>
            </select>
          </div>
        </div>
        <div>
          <label><span class="v2-required">Message</span></label>
          <textarea name="content" required></textarea>
        </div>
        <button type="submit" class="v2-btn v2-btn--gold" style="margin-top:10px">Send inquiry →</button>
      </form>
    </div>
  </div>
</div>

{include file=foot.html}

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站授权验证 - 请联系开发商</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0e1a 0%, #0d1b2e 50%, #0a1628 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: #fff;
            overflow: hidden;
        }
        /* 背景星点 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.2) 0%, transparent 100%),
                radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,0.25) 0%, transparent 100%),
                radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.15) 0%, transparent 100%),
                radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.2) 0%, transparent 100%);
            pointer-events: none;
        }
        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 60px 50px;
            max-width: 560px;
            width: 90%;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.05) inset;
            position: relative;
            animation: fadeInUp 0.6s ease both;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        /* 顶部发光线 */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 20%; right: 20%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #3b82f6, #60a5fa, #3b82f6, transparent);
        }
        .lock-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #1e3a5f, #2563eb);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            font-size: 30px;
            box-shadow: 0 0 30px rgba(37, 99, 235, 0.4);
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        .subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .domain-box {
            background: rgba(37, 99, 235, 0.1);
            border: 1px solid rgba(37, 99, 235, 0.3);
            border-radius: 10px;
            padding: 14px 20px;
            margin-bottom: 32px;
            font-size: 15px;
            color: #93c5fd;
            word-break: break-all;
        }
        .domain-label {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .divider {
            height: 1px;
            background: rgba(255,255,255,0.06);
            margin: 28px 0;
        }
        .contact-title {
            font-size: 13px;
            color: rgba(255,255,255,0.45);
            margin-bottom: 18px;
            letter-spacing: 0.5px;
        }
        .contact-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .contact-list li {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 8px;
            padding: 11px 16px;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            text-align: left;
        }
        .contact-list li span.icon {
            font-size: 16px;
            flex-shrink: 0;
        }
        .footer {
            margin-top: 32px;
            font-size: 12px;
            color: rgba(255,255,255,0.2);
        }
        .btn {
            display: inline-block;
            margin-top: 24px;
            padding: 12px 32px;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: #fff;
            border-radius: 8px;
            font-size: 14px;
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.35);
            transition: all 0.2s;
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.45);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="lock-icon">🔒</div>
        <h1>网站授权验证失败</h1>
        <p class="subtitle">当前域名尚未获得使用授权，网站无法正常访问。<br>请联系开发商，获取专属授权码后方可部署使用。</p>

        <div class="domain-box">
            <div class="domain-label">当前域名</div>
            {domain}
        </div>

        <div class="divider"></div>

        <p class="contact-title">— 联系开发商获取授权 —</p>
        <ul class="contact-list">
            <li><span class="icon">💬</span> 微信：mumuboom</li>
            <li><span class="icon">📧</span> 邮箱：mumuboon@126.com</li>
        </ul>

        <p class="footer">授权码与域名绑定，一域一码，不可转让</p>
    </div>
</body>
</html>
